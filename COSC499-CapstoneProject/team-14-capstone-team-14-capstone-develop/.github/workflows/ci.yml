name: CI Pipeline # full lint → test → build → security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
permissions:
  contents: read
  security-events: write

###############################################################################
# 🐍 BACKEND · CODE QUALITY – flake8 · Black · isort
###############################################################################
jobs:
  backend-code-quality:
    name: 🐍 Backend · Code Quality (Python style & format)
    runs-on: ubuntu-latest

    steps:
      - name: ⤵️  Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.11 for linters
        uses: actions/setup-python@v4
        with: { python-version: "3.11" }

      - name: 🐍 Install flake8, Black, isort
        run: |
          python -m pip install --upgrade pip
          pip install -r app/backend/requirements.txt

      - name: 🐍 flake8 — static-analysis / PEP-8
        run: flake8 app/backend --max-line-length=88 --extend-ignore=E203,W503,E501,F401,F402,F541,F811,F841,E722 --exclude=migrations
    
      - name: 🐍 isort — import-order enforcement (Black profile)
        run: |
          isort --profile black app/backend
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-fix import order with isort"
          git push || echo "No changes to push"

      - name: 🐍 Black — formatting enforcement
        run: black --check app/backend

  ###############################################################################
  # 💻 FRONTEND · CODE QUALITY – ESLint · Prettier · tsc
  ###############################################################################
  frontend-code-quality:
    name: 💻 Frontend · Code Quality (JS/TS lint & format)
    runs-on: ubuntu-latest

    steps:
      - name: ⤵️  Checkout repository
        uses: actions/checkout@v3

      - name: 💻 Set up Node 18 for linting
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: 💻 Install front-end dev-deps (npm ci)
        run: |
          cd app/frontend
          npm ci

      - name: 💻 Prettier — formatting check
        run: |
          cd app/frontend
          npx prettier --check "src/**/*.{js,jsx,ts,tsx,css,scss,json}"

      - name: 💻 TypeScript — type-safety compile
        run: |
          cd app/frontend
          npx tsc --noEmit

  ###############################################################################
  # 🐍 BACKEND TESTS – Django unit/integration + coverage
  ###############################################################################
  backend-tests:
    name: 🐍 Backend Tests (pytest + coverage)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: examvault_test
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports: ["5432:5432"]

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with: { python-version: "3.11" }

      - name: ☁️ Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: 📦 Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/backend/requirements.txt

      - name: 🧪 pytest — run Django tests (+coverage)
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: examvault_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          LOG_ROOT: /tmp/app_logs
        run: |
          cd app/backend
          coverage run --source='.' manage.py test
          coverage xml
          coverage report

      - name: 📈 Upload backend coverage → Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./app/backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  ###############################################################################
  # 💻 FRONTEND TESTS – Vitest (Vite) + coverage
  ###############################################################################
  frontend-tests:
    name: 💻 Frontend Tests (Vitest + coverage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: 📦 Install front-end deps
        run: |
          cd app/frontend
          npm ci

      - name: 🧪 Vitest — unit / component tests (+coverage)
        run: |
          cd app/frontend
          npx vitest run --coverage

      - name: 📈 Upload front-end coverage → Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./app/frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  ###############################################################################
  # 🐳 DOCKER BUILD & COMPOSE SMOKE – images build & boot
  ###############################################################################
  build-and-push:
    name: 🐳 Build Docker Images + Compose Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2

      - name: 🐳 Build backend image
        run: docker build -t examvault-backend:test ./app/backend

      - name: 🐳 Build frontend image
        run: docker build -t examvault-frontend:test ./app/frontend

      - name: 🔍 Backend container manage.py check
        run: docker run --rm examvault-backend:test python manage.py check

      - name: 🔍 Frontend container build
        run: docker run --rm examvault-frontend:test npm run build

      - name: 🧪 docker-compose up → down (stack boots?)
        run: |
          cat > .env <<EOF
          POSTGRES_DB=examvault
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          DJANGO_SUPERUSER_USERNAME=admin
          DJANGO_SUPERUSER_EMAIL=admin@example.com
          DJANGO_SUPERUSER_PASSWORD=admin123
          LOG_ROOT=/app/logs
          EOF
          docker compose config
          docker compose up -d
          sleep 10 && docker compose ps
          docker compose down